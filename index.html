*{box-sizing:border-box;margin:0;padding:0;}
html{font-size:16px;}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f4f4f4;-webkit-text-size-adjust:100%;}
select,input,button{font-family:inherit;font-size:16px;}/* 16px evita zoom no iOS */
input[type="date"]{-webkit-appearance:none;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:#ddd;border-radius:4px;}

/* responsivo */
.wrap{max-width:860px;margin:0 auto;padding:16px 12px 48px;}

/* HEADER */
.header{background:#fff;border-bottom:3px solid #b02626;box-shadow:0 2px 8px #00000012;position:sticky;top:0;z-index:100;}
.header-inner{max-width:860px;margin:0 auto;padding:14px 16px;}
.header-top{display:flex;align-items:center;gap:14px;padding-bottom:12px;margin-bottom:12px;border-bottom:1px solid #eee;flex-wrap:wrap;}
.logo-wrap{display:flex;flex-direction:column;align-items:flex-start;flex-shrink:0;}
.logo-name{font-size:clamp(13px,3vw,17px);font-weight:900;letter-spacing:3px;color:#2d3561;text-transform:uppercase;line-height:1;}
.logo-row{display:flex;align-items:center;gap:6px;margin-top:4px;}
.logo-dash{height:2px;width:clamp(14px,2vw,20px);background:#b02626;}
.logo-adv{font-size:clamp(7px,1.5vw,10px);letter-spacing:4px;color:#2d3561;text-transform:uppercase;font-weight:700;}
.divider-v{width:1px;height:36px;background:#eee;flex-shrink:0;}
.header-info{display:flex;flex-direction:column;gap:4px;}
.header-label{font-size:11px;color:#aaa;}
.header-socials{display:flex;gap:12px;flex-wrap:wrap;}
.social-tag{font-size:11px;color:#b02626;font-weight:700;}
.header-title{display:flex;align-items:center;gap:10px;}
.title-bar{width:4px;height:32px;background:#b02626;border-radius:2px;flex-shrink:0;}
.title-text h1{font-size:clamp(15px,3.5vw,19px);font-weight:900;color:#1a1a1a;line-height:1.2;}
.title-text p{font-size:11px;color:#aaa;margin-top:2px;}

/* CARD */
.card{background:#fff;border-radius:10px;box-shadow:0 2px 10px #00000010;border:1px solid #eee;padding:16px;margin-bottom:12px;}

/* MODO */
.modo-wrap{display:flex;gap:8px;margin-bottom:12px;}
.modo-btn{flex:1;padding:12px 8px;border-radius:8px;border:2px solid #ddd;background:#fff;color:#555;font-weight:700;font-size:14px;cursor:pointer;transition:.15s;}
.modo-btn.active{border-color:#b02626;background:#b02626;color:#fff;}

/* RAMO */
.ramo-wrap{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:4px;}
.ramo-btn{padding:8px 16px;border-radius:6px;border:2px solid #ddd;background:#fff;color:#444;font-weight:700;font-size:13px;cursor:pointer;transition:.15s;white-space:nowrap;}
.ramo-btn.active{color:#fff;}

/* LABEL */
.field-label{font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:6px;}

/* INPUTS */
.inp{width:100%;padding:12px 14px;border-radius:8px;border:1.5px solid #ddd;font-size:16px;background:#fff;color:#1a1a1a;outline:none;transition:.15s;}
.inp:focus{border-color:#b02626;}

/* GRID 2 COL */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:480px){.grid2{grid-template-columns:1fr;}}

/* SELECT PRAZO */
.prazo-select{width:100%;padding:8px 10px;border-radius:8px;border:1.5px solid #ddd;font-size:13px;background:#fff;min-height:100px;}
.prazo-info{margin-top:8px;padding:10px 14px;background:#fafafa;border-radius:6px;font-size:13px;border-left:3px solid #b02626;}

/* CHECKBOX */
.check-wrap{display:flex;align-items:flex-start;gap:10px;margin:12px 0;}
.check-wrap input{width:18px;height:18px;accent-color:#b02626;flex-shrink:0;margin-top:1px;}
.check-wrap label{font-size:12px;color:#666;line-height:1.5;cursor:pointer;}

/* BOTÃO CALCULAR */
.calc-btn{width:100%;padding:14px;border-radius:8px;border:none;background:#b02626;color:#fff;font-size:16px;font-weight:800;cursor:pointer;letter-spacing:.5px;box-shadow:0 4px 14px #b0262633;transition:.15s;}
.calc-btn:active{background:#8c1c1c;}

/* RESULTADO */
.result-status{padding:18px 20px;color:#fff;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;}
.result-label{font-size:11px;opacity:.85;font-weight:700;text-transform:uppercase;letter-spacing:1px;}
.result-days{font-size:clamp(22px,6vw,30px);font-weight:900;margin-top:3px;}
.result-date{text-align:right;}
.result-date-label{font-size:11px;opacity:.8;}
.result-date-val{font-size:clamp(12px,3vw,14px);font-weight:700;margin-top:2px;}

/* TIMELINE */
.timeline-wrap{padding:16px;}
.timeline-label{font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}
.timeline-days{display:flex;flex-wrap:wrap;gap:5px;}
.day-box{min-width:42px;padding:5px 6px;border-radius:6px;text-align:center;border:1.5px solid;}
.day-weekday{font-size:8px;color:#aaa;}
.day-num{font-size:13px;font-weight:700;}
.day-tag{font-size:8px;font-weight:700;}
.legend{display:flex;gap:12px;margin-top:10px;flex-wrap:wrap;}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#888;}
.legend-dot{width:10px;height:10px;border-radius:2px;border:1px solid #ddd;}

/* INFO TRIBUNAL */
.tribunal-info{padding:10px 14px;background:#fafafa;border-radius:6px;font-size:12px;color:#666;border-left:3px solid;}
.tribunal-info strong{color:#1a1a1a;}

/* RODAPÉ */
.footer{margin-top:24px;text-align:center;border-top:1px solid #e0e0e0;padding-top:20px;}
.footer-logo{display:flex;flex-direction:column;align-items:center;gap:3px;}
.footer-name{font-size:13px;font-weight:900;letter-spacing:4px;color:#2d3561;text-transform:uppercase;}
.footer-row{display:flex;align-items:center;gap:7px;}
.footer-dash{height:1.5px;width:16px;background:#b02626;}
.footer-adv{font-size:9px;letter-spacing:4px;color:#2d3561;font-weight:700;text-transform:uppercase;}
.footer-social{font-size:11px;color:#b02626;margin-top:6px;font-weight:600;}
.footer-disc{font-size:10px;color:#ccc;margin-top:6px;line-height:1.5;max-width:320px;margin-left:auto;margin-right:auto;}
</style>

    {g:"Recursos Criminais",label:"Apelação criminal – interposição (art. 593, CPP)",dias:5,tipo:"corridos"},
    {g:"Recursos Criminais",label:"Apelação criminal – razões (art. 600, CPP)",dias:8,tipo:"corridos"},
    {g:"Recursos Criminais",label:"Apelação – Júri (art. 598, §único, CPP)",dias:15,tipo:"corridos"},
    {g:"Recursos Criminais",label:"RESE – Recurso em Sentido Estrito (art. 586, CPP)",dias:5,tipo:"corridos"},
    {g:"Recursos Criminais",label:"Embargos de Declaração criminais (art. 619, CPP)",dias:2,tipo:"corridos"},
    {g:"Recursos Criminais",label:"Agravo em Execução – LEP (art. 197)",dias:5,tipo:"corridos"},
    {g:"Recursos Criminais",label:"Apelação no JECRIM (art. 82, §1º, Lei 9.099/95)",dias:10,tipo:"uteis"},
    {g:"Cautelares",label:"Prisão temporária – comum (Lei 7.960/89)",dias:5,tipo:"corridos"},
    {g:"Cautelares",label:"Prisão temporária – hediondo (Lei 8.072/90)",dias:30,tipo:"corridos"},
    {g:"Cautelares",label:"Personalizado...",dias:null,tipo:"corridos"},
  ],
  trabalhista:[
    {g:"Conhecimento",label:"Contestação – CPC subsidiário (art. 335)",dias:15,tipo:"uteis"},
    {g:"Conhecimento",label:"Impugnação aos cálculos (art. 884, CLT)",dias:5,tipo:"uteis"},
    {g:"Conhecimento",label:"Embargos à execução trabalhista (art. 884, CLT)",dias:5,tipo:"uteis"},
    {g:"Recursos Trabalhistas",label:"Recurso Ordinário (art. 895, CLT)",dias:8,tipo:"uteis"},
    {g:"Recursos Trabalhistas",label:"Contrarrazões de RO (art. 900, CLT)",dias:8,tipo:"uteis"},
    {g:"Recursos Trabalhistas",label:"Recurso de Revista (art. 896, CLT)",dias:8,tipo:"uteis"},
    {g:"Recursos Trabalhistas",label:"Contrarrazões de RR (art. 900, CLT)",dias:8,tipo:"uteis"},
    {g:"Recursos Trabalhistas",label:"Agravo de Instrumento trabalhista (art. 897, b)",dias:8,tipo:"uteis"},
    {g:"Recursos Trabalhistas",label:"Embargos no TST (art. 894, II, CLT)",dias:8,tipo:"uteis"},
    {g:"Recursos Trabalhistas",label:"Embargos de Declaração (art. 897-A, CLT)",dias:5,tipo:"uteis"},
    {g:"Recursos Trabalhistas",label:"Agravo de Petição (art. 897, a, CLT)",dias:8,tipo:"uteis"},
    {g:"Prescrição",label:"Prescrição bienal – ajuizar após rescisão",dias:730,tipo:"corridos"},
    {g:"Prescrição",label:"Pagamento de verbas rescisórias (art. 477, §6º, CLT)",dias:10,tipo:"corridos"},
    {g:"Prescrição",label:"Personalizado...",dias:null,tipo:"uteis"},
  ],
  eleitoral:[
    {g:"Recursos Eleitorais",label:"Recurso Eleitoral (art. 169, CE)",dias:3,tipo:"corridos"},
    {g:"Recursos Eleitorais",label:"Recurso Especial Eleitoral (art. 276, CE)",dias:3,tipo:"corridos"},
    {g:"Recursos Eleitorais",label:"Contrarrazões de recurso eleitoral (art. 169, §2º)",dias:3,tipo:"corridos"},
    {g:"Recursos Eleitorais",label:"Embargos de Declaração eleitorais (art. 275, §1º)",dias:3,tipo:"corridos"},
    {g:"Ações Eleitorais",label:"AIJE – propositura (art. 22, LC 64/90)",dias:15,tipo:"corridos"},
    {g:"Ações Eleitorais",label:"AIJE – contestação (art. 3º, LC 64/90)",dias:5,tipo:"corridos"},
    {g:"Ações Eleitorais",label:"AIME – após diplomação (art. 14, §10, CF)",dias:15,tipo:"corridos"},
    {g:"Ações Eleitorais",label:"AIRC – impugnação de registro (art. 3º, LC 64/90)",dias:5,tipo:"corridos"},
    {g:"Ações Eleitorais",label:"Captação ilícita de sufrágio (art. 41-A, Lei 9.504/97)",dias:15,tipo:"corridos"},
    {g:"Ações Eleitorais",label:"Personalizado...",dias:null,tipo:"corridos"},
  ],
};

const ramoLabels={civel:"Cível",criminal:"Criminal",trabalhista:"Trabalhista",eleitoral:"Eleitoral"};
const ramoAccent={civel:"#b02626",criminal:"#2d3561",trabalhista:"#1a5c38",eleitoral:"#7c4d00"};

function fmt(d){return d.toLocaleDateString("pt-BR",{weekday:"long",day:"2-digit",month:"long",year:"numeric"});}
function toISO(d){return d.toISOString().slice(0,10);}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function isFer(d,uf){const iso=toISO(d);return feriadosNacionais.has(iso)||(uf&&feriadosEstaduais[uf]?.has(iso));}
function isUtil(d,uf,rec){if(d.getDay()===0||d.getDay()===6)return false;if(isFer(d,uf))return false;if(rec&&emRecesso(d))return false;return true;}

function calcVenc(inicio,qtd,tipo,uf,rec){
  if(qtd===0)return{vencimento:inicio,eventos:[]};
  let atual=addDays(inicio,1);const ev=[];
  if(tipo==="corridos"){
    let c=0;
    while(c<qtd){ev.push({data:new Date(atual),feriado:isFer(atual,uf),recesso:rec&&emRecesso(atual),contado:true});c++;if(c<qtd)atual=addDays(atual,1);}
    while(!isUtil(atual,uf,rec)){atual=addDays(atual,1);ev.push({data:new Date(atual),prorrogado:true});}
  }else{
    let c=0;
    while(c<qtd){const u=isUtil(atual,uf,rec);ev.push({data:new Date(atual),util:u,feriado:isFer(atual,uf),recesso:rec&&emRecesso(atual),contado:u?++c:false});if(c<qtd)atual=addDays(atual,1);}
  }
  return{vencimento:atual,eventos:ev};
}
function diasRest(v){const h=new Date();h.setHours(0,0,0,0);const vv=new Date(v);vv.setHours(0,0,0,0);return Math.round((vv-h)/86400000);}

function App(){
  const [modo,setModo]=useState("vencimento");
  const [ramo,setRamo]=useState("civel");
  const [trib,setTrib]=useState(tribunais.civel[0]);
  const [prazo,setPrazo]=useState(prazos.civel[0]);
  const [cDias,setCDias]=useState(15);
  const [cTipo,setCTipo]=useState("uteis");
  const [dAto,setDAto]=useState("");
  const [dVenc,setDVenc]=useState("");
  const [rec,setRec]=useState(true);
  const [res,setRes]=useState(null);
  const [busca,setBusca]=useState("");

  const accent=ramoAccent[ramo];
  const lista=busca.trim()?prazos[ramo].filter(p=>p.label.toLowerCase().includes(busca.toLowerCase())||(p.g||"").toLowerCase().includes(busca.toLowerCase())):null;

  function mudarRamo(r){setRamo(r);setTrib(tribunais[r][0]);setPrazo(prazos[r][0]);setRes(null);setBusca("");}

  function calc(){
    const isC=prazo.dias===null;
    const qtd=isC?parseInt(cDias):prazo.dias;
    const tipo=isC?cTipo:prazo.tipo;
    const uf=trib.uf;
    if(modo==="vencimento"){
      if(!dAto)return;
      const inicio=new Date(dAto+"T12:00:00");
      const{vencimento,eventos}=calcVenc(inicio,qtd,tipo,uf,rec);
      setRes({modo:"vencimento",vencimento,eventos,restam:diasRest(vencimento),qtd,tipoPrazo:tipo});
    }else{
      if(!dVenc)return;
      const v=new Date(dVenc+"T12:00:00");
      setRes({modo:"restante",vencimento:v,restam:diasRest(v)});
    }
  }

  const sc=res?(res.restam<0?"#b02626":res.restam<=3?"#c0392b":res.restam<=7?"#e67e22":"#1a5c38"):"#1a5c38";

  return(
    <div>
      {/* HEADER */}
      <div className="header">
        <div className="header-inner">
          <div className="header-top">
            <div className="logo-wrap">
              <div className="logo-name">Nicastro Soller</div>
              <div className="logo-row"><div className="logo-dash"/><div className="logo-adv">Advogados</div><div className="logo-dash"/></div>
            </div>
            <div className="divider-v"/>
            <div className="header-info">
              <div className="header-label">Ferramenta Jurídica Gratuita</div>
              <div className="header-socials">
                <span className="social-tag">📸 @nicastrosolleradvogados</span>
                <span className="social-tag">👤 @marcellanicastrosoller</span>
              </div>
            </div>
          </div>
          <div className="header-title">
            <div className="title-bar"/>
            <div className="title-text">
              <h1>⚖️ Calculadora de Prazos Judiciais</h1>
              <p>CPC · CPP · CLT · Código Eleitoral</p>
            </div>
          </div>
        </div>
      </div>

      {/* CONTEÚDO */}
      <div className="wrap">
        {/* Modo */}
        <div className="modo-wrap" style={{marginTop:4}}>
          {[["vencimento","📅 Calcular vencimento"],["restante","⏳ Dias restantes"]].map(([v,l])=>(
            <button key={v} className={`modo-btn${modo===v?" active":""}`} onClick={()=>{setModo(v);setRes(null);}}>{l}</button>
          ))}
        </div>

        {/* Ramo */}
        <div className="card">
          <label className="field-label">Ramo do Direito</label>
          <div className="ramo-wrap">
            {Object.keys(ramoLabels).map(r=>(
              <button key={r} className={`ramo-btn${ramo===r?" active":""}`}
                style={ramo===r?{borderColor:ramoAccent[r],background:ramoAccent[r]}:{}}
                onClick={()=>mudarRamo(r)}>{ramoLabels[r]}</button>
            ))}
          </div>
        </div>

        {/* Campos */}
        <div className="card">
          <div className="grid2" style={{marginBottom:14}}>
            <div>
              <label className="field-label">Tribunal</label>
              <select className="inp" value={trib.id} onChange={e=>setTrib(tribunais[ramo].find(t=>t.id===e.target.value))}>
                {tribunais[ramo].map(t=><option key={t.id} value={t.id}>{t.label}</option>)}
              </select>
            </div>
            <div>
              <label className="field-label">{modo==="vencimento"?"Data do Ato / Publicação":"Data de Vencimento"}</label>
              <input type="date" className="inp" value={modo==="vencimento"?dAto:dVenc}
                onChange={e=>modo==="vencimento"?setDAto(e.target.value):setDVenc(e.target.value)}/>
            </div>
          </div>

          {modo==="vencimento"&&(
            <div style={{marginBottom:14}}>
              <label className="field-label">Tipo de Prazo</label>
              <input placeholder="🔍 Buscar prazo..." className="inp" style={{marginBottom:8,fontSize:15}} value={busca} onChange={e=>setBusca(e.target.value)}/>
              <select className="prazo-select" size={4} value={prazo.label}
                onChange={e=>{const p=prazos[ramo].find(x=>x.label===e.target.value);if(p)setPrazo(p);}}>
                {(lista||prazos[ramo]).map(p=>(
                  <option key={p.label} value={p.label}>
                    {p.g?`[${p.g}] `:""}{p.label}{p.dias!==null?` — ${p.dias}d ${p.tipo==="uteis"?"úteis":"corridos"}`:""}
                  </option>
                ))}
              </select>
              {prazo&&prazo.dias!==null&&(
                <div className="prazo-info" style={{borderLeftColor:accent}}>
                  <strong style={{color:accent}}>{prazo.label}</strong>
                  <span style={{color:"#888",marginLeft:8,fontSize:12}}>{prazo.dias} {prazo.tipo==="uteis"?"dias úteis":"dias corridos"}</span>
                </div>
              )}
            </div>
          )}

          {modo==="vencimento"&&prazo.dias===null&&(
            <div className="grid2" style={{marginBottom:14}}>
              <div>
                <label className="field-label">Dias</label>
                <input type="number" min={1} className="inp" value={cDias} onChange={e=>setCDias(e.target.value)}/>
              </div>
              <div>
                <label className="field-label">Tipo</label>
                <select className="inp" value={cTipo} onChange={e=>setCTipo(e.target.value)}>
                  <option value="uteis">Dias úteis</option>
                  <option value="corridos">Dias corridos</option>
                </select>
              </div>
            </div>
          )}

          <div className="check-wrap">
            <input type="checkbox" id="rec" checked={rec} onChange={e=>setRec(e.target.checked)}/>
            <label htmlFor="rec">Suspender prazos no recesso forense (20/dez–20/jan e julho) — CPC art. 220 / CLT art. 775-A / CPP art. 798-A</label>
          </div>

          <button className="calc-btn" onClick={calc}>Calcular Prazo</button>
        </div>

        {/* Resultado */}
        {res&&(
          <div className="card" style={{padding:0,overflow:"hidden"}}>
            <div className="result-status" style={{background:sc}}>
              <div>
                <div className="result-label">{res.restam<0?"⚠️ PRAZO VENCIDO":res.restam===0?"🚨 VENCE HOJE":"✅ Prazo em aberto"}</div>
                <div className="result-days">{res.restam<0?`${Math.abs(res.restam)} dias atrás`:res.restam===0?"Hoje!":`${res.restam} dias restantes`}</div>
              </div>
              <div className="result-date">
                <div className="result-date-label">Vencimento</div>
                <div className="result-date-val">{fmt(res.vencimento)}</div>
              </div>
            </div>

            {res.modo==="vencimento"&&res.eventos&&res.eventos.length>0&&(
              <div className="timeline-wrap">
                <div className="timeline-label">Linha do tempo — {res.qtd} {res.tipoPrazo==="uteis"?"dias úteis":"dias corridos"}</div>
                <div className="timeline-days">
                  {res.eventos.map((ev,i)=>{
                    const isLast=i===res.eventos.length-1;
                    let bg="#f4f4f4",border="#ddd",text="#555";
                    if(ev.feriado){bg="#fff3f3";border="#f5c6c6";text="#8b0000";}
                    if(ev.recesso&&!ev.feriado){bg="#fff8f0";border="#f5d6a0";text="#7c4d00";}
                    if(ev.util&&ev.contado){bg="#fff5f5";border="#b02626";text="#b02626";}
                    if(isLast){bg=sc+"22";border=sc;text="#1a1a1a";}
                    return(
                      <div key={i} className="day-box" style={{background:bg,borderColor:border}}>
                        <div className="day-weekday">{ev.data.toLocaleDateString("pt-BR",{weekday:"short"}).replace(".","").toUpperCase()}</div>
                        <div className="day-num" style={{color:text}}>{ev.data.getDate().toString().padStart(2,"0")}</div>
                        {ev.contado&&<div className="day-tag" style={{color:"#b02626"}}>D{ev.contado}</div>}
                        {ev.feriado&&<div className="day-tag" style={{color:"#b02626"}}>FER</div>}
                        {ev.recesso&&!ev.feriado&&<div className="day-tag" style={{color:"#7c4d00"}}>REC</div>}
                        {ev.prorrogado&&<div className="day-tag" style={{color:"#888"}}>PRO</div>}
                        {isLast&&!ev.contado&&<div className="day-tag" style={{color:sc}}>FIM</div>}
                      </div>
                    );
                  })}
                </div>
                <div className="legend">
                  {[["#b02626","Dia contado"],["#f5c6c6","Feriado"],["#f5d6a0","Recesso"],[sc,"Vencimento"]].map(([cor,label])=>(
                    <div key={label} className="legend-item"><div className="legend-dot" style={{background:cor}}/>{label}</div>
                  ))}
                </div>
              </div>
            )}

            <div style={{padding:"0 16px 16px"}}>
              <div className="tribunal-info" style={{borderLeftColor:accent}}>
                <strong>{trib.label}</strong> · {trib.uf} · {res.modo==="vencimento"?`${res.tipoPrazo==="uteis"?"Dias úteis":"Dias corridos"}`:"Dias restantes"}
                {res.modo==="vencimento"&&prazo?.label&&` · ${prazo.label}`}
              </div>
            </div>
          </div>
        )}

        {/* Rodapé */}
        <div className="footer">
          <div className="footer-logo">
            <div className="footer-name">Nicastro Soller</div>
            <div className="footer-row"><div className="footer-dash"/><div className="footer-adv">Advogados</div><div className="footer-dash"/></div>
          </div>
          <div className="footer-social">@nicastrosolleradvogados · @marcellanicastrosoller</div>
          <div className="footer-disc">Ferramenta jurídica gratuita · Uso exclusivamente informativo · Sempre confirme com a legislação vigente</div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
