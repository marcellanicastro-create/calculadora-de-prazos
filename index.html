    {grupo:"Conhecimento",label:"Impugnação aos cálculos de liquidação (art. 884, §§, CLT)",dias:5,tipo:"uteis"},
    {grupo:"Conhecimento",label:"Embargos à execução trabalhista (art. 884, CLT)",dias:5,tipo:"uteis"},
    {grupo:"Recursos Trabalhistas",label:"Recurso Ordinário (art. 895, CLT)",dias:8,tipo:"uteis"},
    {grupo:"Recursos Trabalhistas",label:"Contrarrazões de Recurso Ordinário (art. 900, CLT)",dias:8,tipo:"uteis"},
    {grupo:"Recursos Trabalhistas",label:"Recurso de Revista (art. 896, CLT)",dias:8,tipo:"uteis"},
    {grupo:"Recursos Trabalhistas",label:"Contrarrazões de Recurso de Revista (art. 900, CLT)",dias:8,tipo:"uteis"},
    {grupo:"Recursos Trabalhistas",label:"Agravo de Instrumento trabalhista (art. 897, b, CLT)",dias:8,tipo:"uteis"},
    {grupo:"Recursos Trabalhistas",label:"Embargos no TST (art. 894, II, CLT)",dias:8,tipo:"uteis"},
    {grupo:"Recursos Trabalhistas",label:"Embargos de Declaração trabalhistas (art. 897-A, CLT)",dias:5,tipo:"uteis"},
    {grupo:"Recursos Trabalhistas",label:"Agravo de Petição (art. 897, a, CLT)",dias:8,tipo:"uteis"},
    {grupo:"Recursos Trabalhistas",label:"Contrarrazões de Agravo de Petição (art. 900, CLT)",dias:8,tipo:"uteis"},
    {grupo:"Execução Trabalhista",label:"Impugnação à penhora / avaliação (art. 884, CLT)",dias:5,tipo:"uteis"},
    {grupo:"Execução Trabalhista",label:"Embargos de Terceiro trabalhista (CPC subsidiário)",dias:5,tipo:"uteis"},
    {grupo:"Prescrição e Decadência",label:"Prescrição bienal – ajuizar após rescisão (art. 7º, XXIX, CF)",dias:730,tipo:"corridos"},
    {grupo:"Prescrição e Decadência",label:"Rescisão – pagamento de verbas (art. 477, §6º, CLT)",dias:10,tipo:"corridos"},
    {grupo:"Prescrição e Decadência",label:"Personalizado...",dias:null,tipo:"uteis"},
  ],
  eleitoral:[
    {grupo:"Recursos Eleitorais",label:"Recurso Eleitoral (art. 169, CE)",dias:3,tipo:"corridos"},
    {grupo:"Recursos Eleitorais",label:"Recurso Especial Eleitoral (art. 276, CE)",dias:3,tipo:"corridos"},
    {grupo:"Recursos Eleitorais",label:"Contrarrazões de recurso eleitoral (art. 169, §2º, CE)",dias:3,tipo:"corridos"},
    {grupo:"Recursos Eleitorais",label:"Embargos de Declaração eleitorais (art. 275, §1º, CE)",dias:3,tipo:"corridos"},
    {grupo:"Recursos Eleitorais",label:"Agravo Regimental eleitoral (RITSE/RITSUE)",dias:3,tipo:"corridos"},
    {grupo:"Recursos Eleitorais",label:"Recurso contra propaganda irregular – 24h (art. 96, §8º, Lei 9.504/97)",dias:1,tipo:"corridos"},
    {grupo:"Ações Eleitorais",label:"AIJE – prazo de propositura (art. 22, LC 64/90)",dias:15,tipo:"corridos"},
    {grupo:"Ações Eleitorais",label:"AIJE – contestação (art. 3º, LC 64/90)",dias:5,tipo:"corridos"},
    {grupo:"Ações Eleitorais",label:"AIJE – razões finais (art. 22, XV, LC 64/90)",dias:5,tipo:"corridos"},
    {grupo:"Ações Eleitorais",label:"AIME – propositura após diplomação (art. 14, §10, CF)",dias:15,tipo:"corridos"},
    {grupo:"Ações Eleitorais",label:"AIRC – impugnação de registro (art. 3º, LC 64/90)",dias:5,tipo:"corridos"},
    {grupo:"Ações Eleitorais",label:"Captação ilícita de sufrágio (art. 41-A, Lei 9.504/97)",dias:15,tipo:"corridos"},
    {grupo:"Ações Eleitorais",label:"Abuso de poder econômico (art. 22, LC 64/90)",dias:15,tipo:"corridos"},
    {grupo:"Ações Eleitorais",label:"Personalizado...",dias:null,tipo:"corridos"},
  ],
};

const ramoLabels={civel:"Cível",criminal:"Criminal",trabalhista:"Trabalhista",eleitoral:"Eleitoral"};
const colors={
  civel:{bg:"#1e3a5f",accent:"#3b82f6",light:"#eff6ff"},
  criminal:{bg:"#4a1942",accent:"#a855f7",light:"#faf5ff"},
  trabalhista:{bg:"#14532d",accent:"#22c55e",light:"#f0fdf4"},
  eleitoral:{bg:"#7c2d12",accent:"#f97316",light:"#fff7ed"},
};

function fmt(d){return d.toLocaleDateString("pt-BR",{weekday:"long",day:"2-digit",month:"long",year:"numeric"});}
function toISO(d){return d.toISOString().slice(0,10);}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function isFeriado(d,uf){const iso=toISO(d);return feriadosNacionais.has(iso)||(uf&&feriadosEstaduais[uf]?.has(iso));}
function isUtil(d,uf,rec){const dow=d.getDay();if(dow===0||dow===6)return false;if(isFeriado(d,uf))return false;if(rec&&emRecesso(d))return false;return true;}

function calcularVencimento(inicio,qtd,tipo,uf,rec){
  if(qtd===0)return{vencimento:inicio,eventos:[]};
  let atual=addDays(inicio,1);const eventos=[];
  if(tipo==="corridos"){
    let c=0;
    while(c<qtd){eventos.push({data:new Date(atual),feriado:isFeriado(atual,uf),recesso:rec&&emRecesso(atual),contado:true});c++;if(c<qtd)atual=addDays(atual,1);}
    while(!isUtil(atual,uf,rec)){atual=addDays(atual,1);eventos.push({data:new Date(atual),prorrogado:true});}
  }else{
    let c=0;
    while(c<qtd){const u=isUtil(atual,uf,rec);eventos.push({data:new Date(atual),util:u,feriado:isFeriado(atual,uf),recesso:rec&&emRecesso(atual),contado:u?++c:false});if(c<qtd)atual=addDays(atual,1);}
  }
  return{vencimento:atual,eventos};
}
function diasRestantes(v){const h=new Date();h.setHours(0,0,0,0);const vv=new Date(v);vv.setHours(0,0,0,0);return Math.round((vv-h)/86400000);}

function App(){
  const [modo,setModo]=useState("vencimento");
  const [ramo,setRamo]=useState("civel");
  const [tribunal,setTribunal]=useState(tribunais.civel[0]);
  const [prazoSel,setPrazoSel]=useState(prazosConfig.civel[0]);
  const [customDias,setCustomDias]=useState(15);
  const [customTipo,setCustomTipo]=useState("uteis");
  const [dataAto,setDataAto]=useState("");
  const [dataVenc,setDataVenc]=useState("");
  const [usarRecesso,setUsarRecesso]=useState(true);
  const [resultado,setResultado]=useState(null);
  const [busca,setBusca]=useState("");

  const c=colors[ramo];
  const prazosFiltrados=busca.trim()?prazosConfig[ramo].filter(p=>p.label.toLowerCase().includes(busca.toLowerCase())||(p.grupo||"").toLowerCase().includes(busca.toLowerCase())):null;

  function handleRamo(r){setRamo(r);setTribunal(tribunais[r][0]);setPrazoSel(prazosConfig[r][0]);setResultado(null);setBusca("");}

  function calcular(){
    const isCustom=prazoSel.dias===null;
    const qtd=isCustom?parseInt(customDias):prazoSel.dias;
    const tipo=isCustom?customTipo:prazoSel.tipo;
    const uf=tribunal.uf;
    if(modo==="vencimento"){
      if(!dataAto)return;
      const inicio=new Date(dataAto+"T12:00:00");
      const{vencimento,eventos}=calcularVencimento(inicio,qtd,tipo,uf,usarRecesso);
      setResultado({tipo:"vencimento",vencimento,eventos,restam:diasRestantes(vencimento),qtd,tipoPrazo:tipo});
    }else{
      if(!dataVenc)return;
      const v=new Date(dataVenc+"T12:00:00");
      setResultado({tipo:"restante",vencimento:v,restam:diasRestantes(v)});
    }
  }

  const sc=resultado?(resultado.restam<0?"#ef4444":resultado.restam<=3?"#f97316":resultado.restam<=7?"#eab308":"#22c55e"):"#22c55e";

  return (
    <div style={{fontFamily:"'Segoe UI',sans-serif",minHeight:"100vh",background:"#f1f5f9",paddingBottom:48}}>
      <div style={{background:c.bg,color:"#fff",padding:"20px 28px 16px"}}>
        <div style={{maxWidth:860,margin:"0 auto"}}>
          <div style={{fontSize:10,letterSpacing:2,opacity:.7,textTransform:"uppercase"}}>Calculadora Jurídica</div>
          <h1 style={{margin:"4px 0 2px",fontSize:20,fontWeight:700}}>⚖️ Prazos Judiciais</h1>
          <p style={{margin:0,opacity:.75,fontSize:12}}>CPC · CPP · CLT · Código Eleitoral — todos os prazos legais</p>
        </div>
      </div>
      <div style={{maxWidth:860,margin:"0 auto",padding:"20px 14px 0"}}>
        <div style={{display:"flex",gap:8,marginBottom:16}}>
          {[["vencimento","📅 Calcular vencimento"],["restante","⏳ Dias restantes"]].map(([v,l])=>(
            <button key={v} onClick={()=>{setModo(v);setResultado(null);}}
              style={{flex:1,padding:"10px 0",borderRadius:8,border:"2px solid",
                borderColor:modo===v?c.accent:"#cbd5e1",
                background:modo===v?c.accent:"#fff",color:modo===v?"#fff":"#475569",
                fontWeight:600,fontSize:14,cursor:"pointer"}}>{l}</button>
          ))}
        </div>
        <div style={{marginBottom:14}}>
          <label style={{fontSize:11,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:1}}>Ramo do Direito</label>
          <div style={{display:"flex",gap:8,marginTop:6,flexWrap:"wrap"}}>
            {Object.keys(ramoLabels).map(r=>(
              <button key={r} onClick={()=>handleRamo(r)}
                style={{padding:"8px 18px",borderRadius:20,border:"2px solid",
                  borderColor:ramo===r?colors[r].accent:"#e2e8f0",
                  background:ramo===r?colors[r].accent:"#fff",
                  color:ramo===r?"#fff":"#475569",fontWeight:600,fontSize:13,cursor:"pointer"}}>{ramoLabels[r]}</button>
            ))}
          </div>
        </div>
        <div style={{background:"#fff",borderRadius:12,boxShadow:"0 2px 12px #0001",padding:20,marginBottom:14}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
            <div>
              <label style={{fontSize:11,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:1}}>Tribunal</label>
              <select value={tribunal.id} onChange={e=>setTribunal(tribunais[ramo].find(t=>t.id===e.target.value))}
                style={{width:"100%",marginTop:6,padding:"9px 10px",borderRadius:8,border:"1.5px solid #e2e8f0",fontSize:13,background:"#f8fafc"}}>
                {tribunais[ramo].map(t=><option key={t.id} value={t.id}>{t.label}</option>)}
              </select>
            </div>
            <div>
              <label style={{fontSize:11,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:1}}>
                {modo==="vencimento"?"Data do Ato / Publicação":"Data de Vencimento"}
              </label>
              <input type="date" value={modo==="vencimento"?dataAto:dataVenc}
                onChange={e=>modo==="vencimento"?setDataAto(e.target.value):setDataVenc(e.target.value)}
                style={{display:"block",width:"100%",marginTop:6,padding:"9px 10px",borderRadius:8,border:"1.5px solid #e2e8f0",fontSize:14,boxSizing:"border-box"}}/>
            </div>
          </div>
          {modo==="vencimento"&&(
            <div style={{marginTop:14}}>
              <label style={{fontSize:11,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:1}}>Tipo de Prazo</label>
              <input placeholder="🔍 Buscar prazo..." value={busca} onChange={e=>setBusca(e.target.value)}
                style={{display:"block",width:"100%",marginTop:6,padding:"8px 10px",borderRadius:8,border:"1.5px solid #e2e8f0",fontSize:13,boxSizing:"border-box"}}/>
              <select size={5} value={prazoSel.label}
                onChange={e=>{const p=prazosConfig[ramo].find(x=>x.label===e.target.value);if(p)setPrazoSel(p);}}
                style={{width:"100%",marginTop:6,padding:"6px 10px",borderRadius:8,border:"1.5px solid #e2e8f0",fontSize:13,background:"#f8fafc",minHeight:120}}>
                {(prazosFiltrados||prazosConfig[ramo]).map(p=>(
                  <option key={p.label} value={p.label}>
                    {p.grupo?`[${p.grupo}] `:""}{p.label}{p.dias!==null?` — ${p.dias}d ${p.tipo==="uteis"?"úteis":"corridos"}`:""}
                  </option>
                ))}
              </select>
              {prazoSel&&prazoSel.dias!==null&&(
                <div style={{marginTop:8,padding:"8px 12px",background:c.light,borderRadius:8,fontSize:13,color:c.bg,borderLeft:`3px solid ${c.accent}`}}>
                  <strong>{prazoSel.label}</strong><br/>
                  <span style={{opacity:.8}}>{prazoSel.dias} {prazoSel.tipo==="uteis"?"dias úteis":"dias corridos"} — {prazoSel.grupo}</span>
                </div>
              )}
            </div>
          )}
          {modo==="vencimento"&&prazoSel.dias===null&&(
            <div style={{display:"flex",gap:12,marginTop:12}}>
              <div style={{flex:1}}>
                <label style={{fontSize:11,fontWeight:700,color:"#64748b"}}>Dias</label>
                <input type="number" min={1} value={customDias} onChange={e=>setCustomDias(e.target.value)}
                  style={{width:"100%",marginTop:6,padding:"9px 10px",borderRadius:8,border:"1.5px solid #e2e8f0",fontSize:14,boxSizing:"border-box"}}/>
              </div>
              <div style={{flex:1}}>
                <label style={{fontSize:11,fontWeight:700,color:"#64748b"}}>Tipo</label>
                <select value={customTipo} onChange={e=>setCustomTipo(e.target.value)}
                  style={{width:"100%",marginTop:6,padding:"9px 10px",borderRadius:8,border:"1.5px solid #e2e8f0",fontSize:14,background:"#f8fafc"}}>
                  <option value="uteis">Dias úteis</option>
                  <option value="corridos">Dias corridos</option>
                </select>
              </div>
            </div>
          )}
          <div style={{marginTop:12,display:"flex",alignItems:"center",gap:10}}>
            <input type="checkbox" id="recesso" checked={usarRecesso} onChange={e=>setUsarRecesso(e.target.checked)}
              style={{width:16,height:16,accentColor:c.accent}}/>
            <label htmlFor="recesso" style={{fontSize:12,color:"#64748b",cursor:"pointer"}}>
              Suspender prazos no recesso forense (20/dez–20/jan e julho) — CPC art. 220 / CLT art. 775-A / CPP art. 798-A
            </label>
          </div>
          <button onClick={calcular}
            style={{marginTop:18,width:"100%",padding:"12px 0",borderRadius:10,border:"none",
              background:c.accent,color:"#fff",fontSize:15,fontWeight:700,cursor:"pointer",
              boxShadow:`0 4px 14px ${c.accent}55`}}>
            Calcular Prazo
          </button>
        </div>
        {resultado&&(
          <div style={{background:"#fff",borderRadius:12,boxShadow:"0 2px 12px #0001",overflow:"hidden"}}>
            <div style={{background:sc,padding:"16px 22px",color:"#fff",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontSize:11,opacity:.85,fontWeight:600,textTransform:"uppercase"}}>
                  {resultado.restam<0?"⚠️ PRAZO VENCIDO":resultado.restam===0?"🚨 VENCE HOJE":"✅ Em aberto"}
                </div>
                <div style={{fontSize:26,fontWeight:800,marginTop:2}}>
                  {resultado.restam<0?`${Math.abs(resultado.restam)} dias atrás`:resultado.restam===0?"Hoje!":`${resultado.restam} dias restantes`}
                </div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:11,opacity:.85}}>Vencimento</div>
                <div style={{fontSize:14,fontWeight:700}}>{fmt(resultado.vencimento)}</div>
              </div>
            </div>
            {resultado.tipo==="vencimento"&&resultado.eventos&&resultado.eventos.length>0&&(
              <div style={{padding:20}}>
                <div style={{fontSize:12,fontWeight:700,color:"#64748b",marginBottom:10,textTransform:"uppercase",letterSpacing:1}}>
                  Linha do tempo — {resultado.qtd} {resultado.tipoPrazo==="uteis"?"dias úteis":"dias corridos"}
                </div>
                <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                  {resultado.eventos.map((ev,i)=>{
                    const isLast=i===resultado.eventos.length-1;
                    let bg="#f1f5f9",border="#e2e8f0",text="#475569";
                    if(ev.feriado){bg="#fef9c3";border="#fbbf24";text="#92400e";}
                    if(ev.recesso){bg="#fce7f3";border="#ec4899";text="#9d174d";}
                    if(ev.util&&ev.contado){bg=c.light;border=c.accent;text=c.bg;}
                    if(isLast){bg=sc+"22";border=sc;text="#1e293b";}
                    return(
                      <div key={i} style={{minWidth:46,padding:"5px 7px",borderRadius:8,background:bg,border:`1.5px solid ${border}`,textAlign:"center"}}>
                        <div style={{fontSize:9,color:"#94a3b8"}}>{ev.data.toLocaleDateString("pt-BR",{weekday:"short"}).replace(".","").toUpperCase()}</div>
                        <div style={{fontSize:13,fontWeight:700,color:text}}>{ev.data.getDate().toString().padStart(2,"0")}</div>
                        {ev.contado&&<div style={{fontSize:8,color:c.accent,fontWeight:700}}>D{ev.contado}</div>}
                        {ev.feriado&&<div style={{fontSize:8,color:"#92400e"}}>FER</div>}
                        {ev.recesso&&!ev.feriado&&<div style={{fontSize:8,color:"#9d174d"}}>REC</div>}
                        {ev.prorrogado&&<div style={{fontSize:8,color:"#6b7280"}}>PRO</div>}
                        {isLast&&!ev.contado&&<div style={{fontSize:8,color:sc,fontWeight:700}}>FIM</div>}
                      </div>
                    );
                  })}
                </div>
                <div style={{display:"flex",gap:14,marginTop:12,flexWrap:"wrap"}}>
                  {[[c.accent,"Dia contado"],["#fbbf24","Feriado"],["#ec4899","Recesso"],[sc,"Vencimento"]].map(([cor,label])=>(
                    <div key={label} style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:"#64748b"}}>
                      <div style={{width:10,height:10,borderRadius:2,background:cor}}/>{label}
                    </div>
                  ))}
                </div>
              </div>
            )}
            <div style={{padding:"0 20px 16px"}}>
              <div style={{padding:"10px 14px",background:"#f8fafc",borderRadius:8,fontSize:12,color:"#64748b",borderLeft:`3px solid ${c.accent}`}}>
                <strong>{tribunal.label}</strong> · UF: {tribunal.uf} · {resultado.tipo==="vencimento"?`${resultado.tipoPrazo==="uteis"?"Dias úteis":"Dias corridos"}`:"Modo: dias restantes"}
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
